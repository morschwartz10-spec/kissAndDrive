<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נשק וסע - לוח מתנדבים</title>
    
    <!-- Modern Fonts for Hebrew & English -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- App Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- App Container -->
    <div id="app">
        <!-- Content will be injected here by app.js -->
    </div>
    
    <!-- Direct Sign Up Modal -->
    <div id="directSignUpModal" class="modal-overlay">
        <div class="modal-content card">
            <button class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button>
            <h3 style="margin-bottom: 15px;">התנדבות למשמרת ספציפית</h3>
            <p id="modalDateDisplay" style="margin-bottom: 15px; font-weight: 500; color: var(--primary);"></p>
            <div class="form-group">
                <label>מהו מספר הטלפון שלך?</label>
                <input type="tel" id="modalPhoneInput" class="form-control" placeholder="למשל: 050-1234567" pattern="^05\\d-?\\d{7}$" title="מספר טלפון חייב להכיל 10 ספרות ולהתחיל ב-05">
                <small style="color: var(--text-secondary); display:block; margin-top:5px;">
                    אם כבר נרשמת בעבר, המערכת תזהה אותך ותשבץ אותך מיד. אם לא, תועבר להרשמה קצרה.
                </small>
            </div>
            <button id="modalSubmitBtn" class="btn btn-primary" style="width:100%;">
                <i class="fas fa-bolt"></i> המשך לשיבוץ
            </button>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <!-- Firebase Firestore -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
